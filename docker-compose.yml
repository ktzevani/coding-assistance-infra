name: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}
    volumes:
      - ${DATA_ROOT:-./data}/ollama:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"
    networks:
      - local-ai
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  llama-cpp:
    profiles: ["llama"]
    build:
      context: images/llama-cpp
      args:
        LLAMA_CPP_BASE_IMAGE: ${LLAMA_CPP_BASE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    image: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}/llama-cpp-server:latest
    restart: unless-stopped
    environment:
      LLAMA_CPP_HOST: 0.0.0.0
      LLAMA_CPP_HOST_PORT: 8080
      LLAMA_CPP_MODELS_PRESET: ${LLAMA_CPP_MODELS_PRESET:-/config/models.ini}
      LLAMA_CPP_MODELS_MAX: ${LLAMA_CPP_MODELS_MAX:-1}
      LLAMA_CPP_MODELS_AUTOLOAD: ${LLAMA_CPP_MODELS_AUTOLOAD:-true}
      LLAMA_CPP_METRICS: ${LLAMA_CPP_METRICS:-false}
    volumes:
      - ${MODEL_ROOT:-./models}:/models:ro
      - ${LLAMA_CPP_CONFIG_ROOT:-./config/llama-cpp}/models.ini:/config/models.ini:ro
    ports:
      - "127.0.0.1:${LLAMA_CPP_HOST_PORT:-8080}:8080"
    networks:
      - local-ai

  llama-cpp-embeddings:
    profiles: ["embeddings-gguf"]
    build:
      context: images/llama-cpp
      args:
        LLAMA_CPP_BASE_IMAGE: ${LLAMA_CPP_BASE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    image: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}/llama-cpp-server:latest
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/local-ai-embedding-entrypoint.sh"]
    environment:
      LLAMA_CPP_EMBED_MODEL_PATH: ${LLAMA_CPP_EMBED_MODEL_PATH:-/models/Qwen3-Embedding-0.6B-Q8_0.gguf}
      LLAMA_CPP_EMBED_HF_REPO: ${LLAMA_CPP_EMBED_HF_REPO:-}
      LLAMA_CPP_EMBED_CTX_SIZE: ${LLAMA_CPP_EMBED_CTX_SIZE:-8192}
      LLAMA_CPP_EMBED_N_GPU_LAYERS: ${LLAMA_CPP_EMBED_N_GPU_LAYERS_CPU:-0}
      LLAMA_CPP_EMBED_THREADS: ${LLAMA_CPP_EMBED_THREADS:-8}
      LLAMA_CPP_EMBED_BATCH_SIZE: ${LLAMA_CPP_EMBED_BATCH_SIZE:-2048}
      LLAMA_CPP_EMBED_UBATCH_SIZE: ${LLAMA_CPP_EMBED_UBATCH_SIZE:-512}
      LLAMA_CPP_EMBED_PARALLEL: ${LLAMA_CPP_EMBED_PARALLEL:-1}
      LLAMA_CPP_EMBED_POOLING: ${LLAMA_CPP_EMBED_POOLING:-last}
    volumes:
      - ${MODEL_ROOT:-./models}:/models:ro
      - ${DATA_ROOT:-./data}/llama-cpp-cache:/root/.cache/llama.cpp
    ports:
      - "127.0.0.1:${LLAMA_CPP_EMBED_HOST_PORT:-8081}:8080"
    networks:
      - local-ai

  model-init:
    profiles: ["init"]
    build:
      context: images/model-init
    image: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}/model-init:latest
    environment:
      OLLAMA_URL: http://ollama:11434
      FAST_MODEL_OLLAMA: ${FAST_MODEL_OLLAMA:-devstral:24b}
      EMBED_MODEL_OLLAMA: ${EMBED_MODEL_OLLAMA:-qwen3-embedding:0.6b}
      LLAMA_CPP_MODEL_PATH_1: ${LLAMA_CPP_MODEL_PATH_1:-}
      LLAMA_CPP_MODEL_HF_REPO_1: ${LLAMA_CPP_MODEL_HF_REPO_1:-}
      LLAMA_CPP_MODEL_HF_FILE_1: ${LLAMA_CPP_MODEL_HF_FILE_1:-}
      LLAMA_CPP_MODEL_PATH_2: ${LLAMA_CPP_MODEL_PATH_2:-}
      LLAMA_CPP_MODEL_HF_REPO_2: ${LLAMA_CPP_MODEL_HF_REPO_2:-}
      LLAMA_CPP_MODEL_HF_FILE_2: ${LLAMA_CPP_MODEL_HF_FILE_2:-}
      LLAMA_CPP_EMBED_MODEL_PATH: ${LLAMA_CPP_EMBED_MODEL_PATH:-/models/Qwen3-Embedding-0.6B-Q8_0.gguf}
      LLAMA_CPP_EMBED_MODEL_HF_REPO: ${LLAMA_CPP_EMBED_MODEL_HF_REPO:-Qwen/Qwen3-Embedding-0.6B-GGUF}
      LLAMA_CPP_EMBED_MODEL_HF_FILE: ${LLAMA_CPP_EMBED_MODEL_HF_FILE:-Qwen3-Embedding-0.6B-Q8_0.gguf}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ${MODEL_ROOT:-./models}:/models
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - local-ai

  diagnostics:
    profiles: ["diagnostics"]
    build:
      context: images/diagnostics
    image: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}/local-ai-diagnostics:latest
    environment:
      OLLAMA_URL: http://ollama:11434
      LLAMA_CPP_URL: http://llama-cpp:8080
      LLAMA_CPP_EMBED_URL: http://llama-cpp-embeddings:8080
      QDRANT_URL: http://qdrant:6333
      FAST_MODEL_OLLAMA: ${FAST_MODEL_OLLAMA:-devstral:24b}
      EMBED_MODEL_OLLAMA: ${EMBED_MODEL_OLLAMA:-qwen3-embedding:0.6b}
      LLAMA_CPP_MODEL_PATH_1: ${LLAMA_CPP_MODEL_PATH_1:-}
      LLAMA_CPP_MODEL_HF_REPO_1: ${LLAMA_CPP_MODEL_HF_REPO_1:-}
      LLAMA_CPP_MODEL_HF_FILE_1: ${LLAMA_CPP_MODEL_HF_FILE_1:-}
      LLAMA_CPP_MODEL_PATH_2: ${LLAMA_CPP_MODEL_PATH_2:-}
      LLAMA_CPP_MODEL_HF_REPO_2: ${LLAMA_CPP_MODEL_HF_REPO_2:-}
      LLAMA_CPP_MODEL_HF_FILE_2: ${LLAMA_CPP_MODEL_HF_FILE_2:-}
      LLAMA_CPP_CHAT_MODEL: ${LLAMA_CPP_CHAT_MODEL:-qwen3-coder-30b-64k}
      LLAMA_CPP_EMBED_MODEL_PATH: ${LLAMA_CPP_EMBED_MODEL_PATH:-/models/Qwen3-Embedding-0.6B-Q8_0.gguf}
      LLAMA_CPP_EMBED_MODEL_HF_REPO: ${LLAMA_CPP_EMBED_MODEL_HF_REPO:-Qwen/Qwen3-Embedding-0.6B-GGUF}
      LLAMA_CPP_EMBED_MODEL_HF_FILE: ${LLAMA_CPP_EMBED_MODEL_HF_FILE:-Qwen3-Embedding-0.6B-Q8_0.gguf}
      HF_TOKEN: ${HF_TOKEN:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
    networks:
      - local-ai

networks:
  local-ai:
    name: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}-network
