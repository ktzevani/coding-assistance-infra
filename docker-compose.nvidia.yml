services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}
              capabilities: [gpu]

  llama-cpp:
    build:
      args:
        LLAMA_CPP_BASE_IMAGE: ${LLAMA_CPP_CUDA_BASE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}
              capabilities: [gpu]

  llama-cpp-embeddings:
    build:
      args:
        LLAMA_CPP_BASE_IMAGE: ${LLAMA_CPP_CUDA_BASE_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    environment:
      LLAMA_CPP_EMBED_N_GPU_LAYERS: ${LLAMA_CPP_EMBED_N_GPU_LAYERS_NVIDIA:--1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}
              capabilities: [gpu]

  diagnostics:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-all}
              capabilities: [gpu]
