services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT:-./data}/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:${QDRANT_HOST_PORT:-6333}:6333"
    networks:
      - local-ai

  rag-mcp:
    build:
      context: images/rag-mcp
    image: ${COMPOSE_PROJECT_NAME:-coding-assistance-infra}/rag-mcp:latest
    restart: unless-stopped
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      EMBED_MODEL_OLLAMA: ${EMBED_MODEL_OLLAMA:-qwen3-embedding:0.6b}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-ollama}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      EMBEDDING_MODEL_ID: ${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      EMBEDDING_DOCUMENT_PREFIX: ${EMBEDDING_DOCUMENT_PREFIX:-}
      EMBEDDING_QUERY_PREFIX: ${EMBEDDING_QUERY_PREFIX:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-project_memory}
      RAG_TOP_K: ${RAG_TOP_K:-8}
      RAG_MAX_CHUNK_TOKENS: ${RAG_MAX_CHUNK_TOKENS:-600}
      RAG_MAX_CONTEXT_TOKENS: ${RAG_MAX_CONTEXT_TOKENS:-4000}
      RAG_COLLECTIONS_CONFIG: ${RAG_COLLECTIONS_CONFIG:-/config/rag/collections.example.yaml}
      RAG_WORKSPACE_ROOT: ${RAG_WORKSPACE_ROOT:-./workspaces}
      WORKSPACE_ROOT: /workspaces
    volumes:
      - ${RAG_WORKSPACE_ROOT:-./workspaces}:/workspaces:ro
      - ./config/rag:/config/rag:ro
    ports:
      - "127.0.0.1:${RAG_MCP_HOST_PORT:-8765}:8765"
    depends_on:
      - ollama
      - qdrant
    networks:
      - local-ai
