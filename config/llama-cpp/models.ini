; -------------------------------
; Qwen3.6-35B-A3B-GGUF profile
; -------------------------------
; Based on:
; /models/Qwen3.6-35B-A3B-UD-Q3_K_S.gguf
; unsloth/Qwen3.6-35B-A3B-GGUF
;
; Qwen3.6-35B-A3B has default 262,144-token context.
; Unsloth says to reduce context if OOM appears, but recommends
; at least 128k to preserve extended-context thinking behavior.
; Current working setting is 64k, so this profile keeps 64k.

[qwen3-6-35b-a3b-64k]
model = /models/Qwen3.6-35B-A3B-UD-Q3_K_S.gguf
ctx-size = 65536
n-predict = 12288
cache-type-k = q8_0
cache-type-v = q8_0
batch-size = 512
ubatch-size = 128
parallel = 1
threads = 12
cont-batching = true
temp = 0.6
top-p = 0.95
top-k = 20
min-p = 0.0
presence-penalty = 0.0
repeat-penalty = 1.0
; Reasoning/thinking handling.
; Leave auto unless you verify that OpenCode/tool calls behave badly
; with reasoning output from this model.
reasoning = auto
reasoning-format = auto
reasoning-budget = 4096
load-on-startup = false